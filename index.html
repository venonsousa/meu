<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📻 Rádio Online - Ao Vivo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0a0a14 0%, #1a1a2e 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .radio-player {
      width: 100%;
      max-width: 550px;
      background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
      border-radius: 24px;
      padding: 30px 25px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }
    
    /* Background com blur */
    .bg-overlay {
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background-size: cover;
      background-position: center;
      opacity: 0.2;
      filter: blur(60px);
      z-index: 0;
      transition: background-image 1s ease;
    }
    
    .content {
      position: relative;
      z-index: 1;
    }
    
    /* Header */
    .header {
      text-align: center;
      margin-bottom: 25px;
    }
    
    .logo {
      font-size: 26px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 5px;
    }
    
    .live-badge {
      background: linear-gradient(135deg, #f44336, #ff6b6b);
      color: white;
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 20px;
      animation: pulse 2s infinite;
      font-weight: 600;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.05); }
    }
    
    .station-name {
      color: #888;
      font-size: 13px;
      letter-spacing: 1px;
      margin-top: 5px;
    }
    
    /* 🖼️ FOTO DO ARTISTA EM DESTAQUE */
    .artist-photo-container {
      width: 180px;
      height: 180px;
      margin: 0 auto 20px;
      position: relative;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5), 0 0 0 3px rgba(76,175,80,0.3);
      background: linear-gradient(135deg, #2a2a4a, #1a1a2e);
    }
    
    .artist-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease, opacity 0.3s ease;
    }
    
    .artist-photo.loading {
      opacity: 0.5;
      transform: scale(0.95);
    }
    
    .artist-photo-placeholder {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      color: rgba(255,255,255,0.2);
      background: linear-gradient(135deg, #2a2a4a, #1a1a2e);
    }
    
    .photo-ring {
      position: absolute;
      top: -3px; left: -3px; right: -3px; bottom: -3px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: #4caf50;
      animation: spin 3s linear infinite;
    }
    
    .photo-ring.paused { animation-play-state: paused; }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Info da música */
    .now-playing {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px;
      margin: 20px 0;
      border: 1px solid rgba(255,255,255,0.1);
      text-align: center;
    }
    
    .now-playing-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #4caf50;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    
    .now-playing-label::before {
      content: "";
      width: 8px;
      height: 8px;
      background: #4caf50;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    
    #song {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin: 8px 0;
      line-height: 1.3;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
      min-height: 55px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.3s ease;
    }
    
    #artist {
      font-size: 16px;
      color: #ccc;
      margin: 4px 0;
      font-weight: 500;
    }
    
    #album-info {
      font-size: 13px;
      color: #888;
      margin-top: 10px;
      font-style: italic;
    }
    
    /* Player de áudio */
    .audio-wrapper {
      margin: 25px 0;
    }
    
    audio {
      width: 100%;
      border-radius: 12px;
      outline: none;
    }
    
    /* Status */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
      color: #aaa;
      margin: 15px 0;
    }
    
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #666;
      transition: all 0.3s;
    }
    
    .status-dot.live { 
      background: #4caf50; 
      box-shadow: 0 0 12px #4caf50;
    }
    .status-dot.buffering { 
      background: #ff9800; 
      animation: pulse 1s infinite;
    }
    .status-dot.error { 
      background: #f44336;
      box-shadow: 0 0 12px #f44336;
    }
    
    /* Histórico */
    .history-section {
      margin-top: 25px;
    }
    
    .history-title {
      font-size: 12px;
      color: #888;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 140px;
      overflow-y: auto;
      padding-right: 5px;
    }
    
    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 2px; }
    .history-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 2px; }
    
    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      font-size: 13px;
      transition: all 0.2s;
    }
    
    .history-item:hover { 
      background: rgba(255,255,255,0.1);
      transform: translateX(5px);
    }
    
    .history-item.current {
      border-left: 3px solid #4caf50;
      background: rgba(76,175,80,0.15);
    }
    
    .history-thumb {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      object-fit: cover;
      background: rgba(255,255,255,0.1);
      flex-shrink: 0;
    }
    
    .history-info {
      flex: 1;
      min-width: 0;
    }
    
    .history-song {
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .history-artist {
      color: #999;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .history-time {
      color: #666;
      font-size: 11px;
      margin-left: 10px;
    }
    
    /* Dica */
    .play-hint {
      text-align: center;
      font-size: 13px;
      color: #777;
      margin-top: 15px;
      font-style: italic;
    }
    
    /* API Status */
    .api-status {
      font-size: 11px;
      color: #666;
      text-align: center;
      margin-top: 10px;
      padding: 8px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
    }
    
    .api-status span {
      color: #4caf50;
    }
    
    /* Responsivo */
    @media (max-width: 480px) {
      .radio-player { padding: 20px 15px; border-radius: 20px; }
      .artist-photo-container { width: 150px; height: 150px; }
      #song { font-size: 19px; min-height: 50px; }
      #artist { font-size: 15px; }
      .logo { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="radio-player">
    <div class="bg-overlay" id="bg-overlay"></div>
    
    <div class="content">
      <div class="header">
        <div class="logo">
          📻 Rádio Online
          <span class="live-badge">AO VIVO</span>
        </div>
        <div class="station-name">Streaming 24/7 • Alta Qualidade</div>
      </div>
      
      <!-- 🖼️ FOTO DO ARTISTA -->
      <div class="artist-photo-container">
        <div class="photo-ring" id="photo-ring"></div>
        <div class="artist-photo-placeholder" id="photo-placeholder">🎤</div>
        <img 
          class="artist-photo loading" 
          id="artist-photo" 
          src="" 
          alt="Foto do artista"
          style="display: none;"
        >
      </div>
      
      <!-- Info da música -->
      <div class="now-playing">
        <div class="now-playing-label">Tocando Agora</div>
        <div id="song">Aguardando...</div>
        <div id="artist">—</div>
        <div id="album-info">Álbum • Ano</div>
      </div>
      
      <!-- Player -->
      <div class="audio-wrapper">
        <audio id="radio" controls preload="none">
          <source src="https://s01.svrdedicado.org:7956/stream" type="audio/mpeg">
          Seu navegador não suporta áudio HTML5.
        </audio>
      </div>
      
      <!-- Status -->
      <div class="status-bar">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Aguardando reprodução</span>
      </div>
      
      <!-- Histórico -->
      <div class="history-section">
        <div class="history-title">🕐 Tocadas recentemente</div>
        <div class="history-list" id="history-list"></div>
      </div>
      
      <!-- Status das APIs -->
      <div class="api-status" id="api-status">
        📡 Buscando foto do artista...
      </div>
      
      <div class="play-hint" id="play-hint">
        💡 Clique em ▶️ para iniciar a rádio
      </div>
    </div>
  </div>

  <script>
    (function() {
      'use strict';
      
      // ⚙️ CONFIGURAÇÕES
      const CONFIG = {
        streamUrl: "https://s01.svrdedicado.org:7956/stream",
        metadataApi: "https://vox.svrdedicado.org/api/g1.Y1to5YdrG8DB-lJjbjRYzcNybhAwZZZ7CkWkxgnq5iU",
        updateInterval: 12000,
        maxHistory: 5,
        country: "BR",
        // 🖼️ APIs para buscar fotos (ordem de prioridade)
        imageApis: [
          { name: 'Deezer', url: 'https://api.deezer.com/search/artist?q={query}&limit=1' },
          { name: 'iTunes', url: 'https://itunes.apple.com/search?term={query}&entity=song&limit=1&country=BR' },
          { name: 'Last.fm', url: 'https://ws.audioscrobbler.com/2.0/?method=artist.getinfo&artist={artist}&api_key=YOUR_KEY&format=json' },
          { name: 'Spotify OEmbed', url: 'https://open.spotify.com/oembed?url=https://open.spotify.com/search/{query}' }
        ]
      };

      // Elementos DOM
      const $ = (sel) => document.querySelector(sel);
      const els = {
        radio: $('#radio'),
        song: $('#song'),
        artist: $('#artist'),
        album: $('#album-info'),
        artistPhoto: $('#artist-photo'),
        photoPlaceholder: $('#photo-placeholder'),
        photoRing: $('#photo-ring'),
        statusDot: $('#status-dot'),
        statusText: $('#status-text'),
        playHint: $('#play-hint'),
        bgOverlay: $('#bg-overlay'),
        historyList: $('#history-list'),
        apiStatus: $('#api-status')
      };

      // Estado
      let state = {
        currentTrack: null,
        history: [],
        isPlaying: false
      };

      // 🔊 Inicialização
      function init() {
        const source = els.radio.querySelector('source');
        source.src = CONFIG.streamUrl.trim();
        els.radio.load();
        setupEvents();
        scheduleMetadataUpdate();
        console.log("✅ Player inicializado");
      }

      // 🎧 Eventos
      function setupEvents() {
        els.radio.addEventListener('play', () => {
          els.playHint.style.display = 'none';
          els.photoRing.classList.remove('paused');
          updateStatus('Conectando...', 'buffering');
        });

        els.radio.addEventListener('playing', () => {
          state.isPlaying = true;
          updateStatus('🔴 Transmitindo', 'live');
        });

        els.radio.addEventListener('pause', () => {
          state.isPlaying = false;
          els.photoRing.classList.add('paused');
          updateStatus('⏸️ Pausado', 'idle');
        });

        els.radio.addEventListener('waiting', () => {
          updateStatus('⏳ Carregando...', 'buffering');
        });

        els.radio.addEventListener('error', (e) => {
          console.error("❌ Erro no stream:", e);
          updateStatus('❌ Sem conexão', 'error');
        });

        // Clique para copiar
        els.song.addEventListener('click', () => {
          const text = `${els.artist.textContent} - ${els.song.textContent}`;
          navigator.clipboard?.writeText(text);
          showNotification('Copiado! 📋');
        });
      }

      // 📊 Status
      function updateStatus(text, type) {
        els.statusText.textContent = text;
        els.statusDot.className = `status-dot ${type}`;
      }

      // 🔄 Atualização periódica
      function scheduleMetadataUpdate() {
        fetchMetadata();
        setTimeout(() => {
          setInterval(fetchMetadata, CONFIG.updateInterval);
        }, 2000);
      }

      // 📡 Busca metadados
      async function fetchMetadata() {
        try {
          const data = await fetchWithTimeout(CONFIG.metadataApi, 8000);
          const track = parseTrackData(data);
          
          if (track && hasTrackChanged(track)) {
            state.currentTrack = track;
            updateDisplay(track);
            addToHistory(track);
            
            // 🖼️ BUSCA FOTO DO ARTISTA
            await fetchArtistPhoto(track.artist);
            await fetchAlbumArt(track.artist, track.title);
          }
        } catch (err) {
          console.warn("⚠️ API falhou:", err.message);
          if (!state.currentTrack) {
            els.song.textContent = "📡 Aguardando sinal...";
            els.artist.textContent = "Rádio Online";
          }
        }
      }

      // ⏱️ Fetch com timeout
      async function fetchWithTimeout(url, timeout = 8000) {
        const ctrl = new AbortController();
        const t = setTimeout(() => ctrl.abort(), timeout);
        try {
          const res = await fetch(url, { signal: ctrl.signal });
          clearTimeout(t);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return await res.json();
        } catch (e) {
          clearTimeout(t);
          if (e.name === 'AbortError') throw new Error('Timeout');
          throw e;
        }
      }

      // 🔍 Parse da resposta
      function parseTrackData(data) {
        if (data?.objects?.[0]?.content) {
          return parseTitle(data.objects[0].content);
        }
        if (data?.song || data?.title) {
          return {
            title: (data.song || data.title || "Desconhecida").trim(),
            artist: (data.artist || data.performer || "Desconhecido").trim(),
            album: data.album || null
          };
        }
        if (typeof data === 'string') {
          return parseTitle(data);
        }
        return null;
      }

      function parseTitle(raw) {
        if (!raw || typeof raw !== 'string') {
          return { title: "Desconhecida", artist: "Desconhecido" };
        }
        const text = raw.trim();
        const parts = text.split(' - ');
        if (parts.length >= 2) {
          return {
            artist: parts[0].trim() || "Desconhecido",
            title: parts.slice(1).join(' - ').trim() || "Desconhecida"
          };
        }
        return { title: text, artist: "Desconhecido" };
      }

      function hasTrackChanged(track) {
        if (!state.currentTrack) return true;
        return (
          track.title !== state.currentTrack.title ||
          track.artist !== state.currentTrack.artist
        );
      }

      // 🖼️ Atualiza display
      function updateDisplay(track) {
        animateTextChange(els.song, track.title);
        animateTextChange(els.artist, track.artist);
        if (track.album) els.album.textContent = track.album;
        document.title = `🔴 ${track.title} • ${track.artist} | Rádio`;
      }

      function animateTextChange(el, newText) {
        if (el.textContent === newText) return;
        el.style.opacity = '0';
        setTimeout(() => {
          el.textContent = newText;
          el.title = newText;
          el.style.opacity = '1';
        }, 150);
      }

      // 🖼️ BUSCA FOTO DO ARTISTA (MÚLTIPLAS APIS)
      async function fetchArtistPhoto(artistName) {
        if (!artistName || artistName === "Desconhecido") {
          showPlaceholder();
          return;
        }

        updateApiStatus(`🔍 Buscando foto de "${artistName}"...`);
        els.artistPhoto.classList.add('loading');

        const query = encodeURIComponent(artistName);
        
        // Tenta cada API em ordem
        for (const api of CONFIG.imageApis) {
          try {
            const url = api.url.replace('{query}', query).replace('{artist}', query);
            
            // Pula Last.fm sem API key
            if (api.name === 'Last.fm' && api.url.includes('YOUR_KEY')) {
              continue;
            }
            
            const data = await fetchWithTimeout(url, 6000);
            const imageUrl = extractImageUrl(api.name, data, artistName);
            
            if (imageUrl) {
              await loadImage(imageUrl);
              updateApiStatus(`✅ Foto encontrada via <span>${api.name}</span>`);
              return;
            }
          } catch (err) {
            console.debug(`❌ ${api.name} falhou:`, err.message);
            continue;
          }
        }

        // Fallback: usa placeholder com iniciais
        showPlaceholder(artistName);
        updateApiStatus('⚠️ Foto não encontrada (usando placeholder)');
      }

      // 🔍 Extrai URL da imagem de cada API
      function extractImageUrl(apiName, data, artistName) {
        try {
          switch(apiName) {
            case 'Deezer':
              if (data?.data?.[0]?.picture_xl) {
                return data.data[0].picture_xl;
              }
              break;
              
            case 'iTunes':
              if (data?.results?.[0]?.artistAvatarUrl) {
                return data.results[0].artistAvatarUrl.replace('100x100bb', '600x600bb');
              }
              // Fallback para capa do álbum
              if (data?.results?.[0]?.artistArtworkUrl) {
                return data.results[0].artistArtworkUrl.replace('100x100bb', '600x600bb');
              }
              break;
              
            case 'Last.fm':
              if (data?.artist?.image) {
                const large = data.artist.image.find(i => i.size === 'extralarge' || i.size === 'large');
                if (large && large['#text']) return large['#text'];
              }
              break;
          }
        } catch (e) {
          console.debug(`Erro ao extrair imagem de ${apiName}:`, e);
        }
        return null;
      }

      // 🖼️ Carrega e exibe imagem
      async function loadImage(url) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.crossOrigin = 'anonymous';
          img.onload = () => {
            els.artistPhoto.src = url;
            els.artistPhoto.style.display = 'block';
            els.artistPhoto.classList.remove('loading');
            els.photoPlaceholder.style.display = 'none';
            
            // Atualiza fundo também
            els.bgOverlay.style.backgroundImage = `url('${url}')`;
            resolve(url);
          };
          img.onerror = () => {
            els.artistPhoto.classList.add('loading');
            reject(new Error('Falha ao carregar imagem'));
          };
          img.src = url;
        });
      }

      // 🎭 Mostra placeholder
      function showPlaceholder(artistName) {
        els.artistPhoto.style.display = 'none';
        els.artistPhoto.classList.add('loading');
        
        if (artistName && artistName !== "Desconhecido") {
          const initials = artistName
            .split(' ')
            .map(n => n[0])
            .slice(0, 2)
            .join('')
            .toUpperCase();
          els.photoPlaceholder.textContent = initials || '🎤';
        } else {
          els.photoPlaceholder.textContent = '🎤';
        }
        
        els.photoPlaceholder.style.display = 'flex';
      }

      // 📋 Histórico
      function addToHistory(track) {
        if (state.history[0]?.key === `${track.artist}|${track.title}`) return;
        
        const item = {
          key: `${track.artist}|${track.title}`,
          artist: track.artist,
          title: track.title,
          time: new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }),
          photo: els.artistPhoto.src || null
        };
        
        state.history.unshift(item);
        if (state.history.length > CONFIG.maxHistory) state.history.pop();
        renderHistory();
      }

      function renderHistory() {
        els.historyList.innerHTML = state.history.map((item, i) => `
          <div class="history-item ${i === 0 ? 'current' : ''}">
            <img class="history-thumb" 
                 src="${item.photo || ''}" 
                 onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%232a2a4a%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23666%22 font-size=%2230%22>🎵</text></svg>'"
                 alt="">
            <div class="history-info">
              <div class="history-song">${escapeHtml(item.title)}</div>
              <div class="history-artist">${escapeHtml(item.artist)}</div>
            </div>
            <span class="history-time">${item.time}</span>
          </div>
        `).join('');
      }

      // 🖼️ Capa do álbum
      async function fetchAlbumArt(artist, title) {
        try {
          const term = encodeURIComponent(`${artist} ${title}`.slice(0, 100));
          const url = `https://itunes.apple.com/search?term=${term}&entity=song&limit=1&country=${CONFIG.country}`;
          const data = await fetchWithTimeout(url, 5000);
          
          if (data?.results?.[0]) {
            const item = data.results[0];
            if (item.collectionName) {
              els.album.textContent = `${item.collectionName} • ${item.releaseDate?.slice(0,4) || ''}`.trim();
            }
          }
        } catch (e) {
          console.debug("Capa não encontrada");
        }
      }

      // 🔐 Escape HTML
      function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      // 📢 Notificação
      function showNotification(msg) {
        const note = document.createElement('div');
        note.textContent = msg;
        note.style.cssText = `
          position: fixed;
          bottom: 30px;
          left: 50%;
          transform: translateX(-50%);
          background: #4caf50;
          color: white;
          padding: 10px 20px;
          border-radius: 20px;
          font-size: 14px;
          z-index: 1000;
          animation: fadeIn 0.3s ease;
        `;
        document.body.appendChild(note);
        setTimeout(() => note.remove(), 2000);
      }

      // 📡 Status das APIs
      function updateApiStatus(msg) {
        els.apiStatus.innerHTML = msg;
      }

      // 🧹 Limpeza
      window.addEventListener('beforeunload', () => {
        els.radio?.pause();
      });

      // 🚀 Start
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
